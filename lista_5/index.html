<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média - DS</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 300px; margin: 0 auto; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; }
        /* Cores do desafio extra */
        .aprovado { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .recuperacao { color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; }
        .reprovado { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cálculo de Média</h2>
    <label>Nota 1:</label>
    <input type="number" id="nota1" placeholder="Ex: 7.5" step="0.1" min="0" max="10">
    
    <label>Nota 2:</label>
    <input type="number" id="nota2" placeholder="Ex: 8.0" step="0.1" min="0" max="10">
    
    <button onclick="calcularMedia()">Calcular Média</button>
    
    <div id="resultado"></div>
</div>

<script>
    function calcularMedia() {
        const nota1Input = document.getElementById('nota1');
        const nota2Input = document.getElementById('nota2');
        const resultadoDiv = document.getElementById('resultado');
        
        const n1 = parseFloat(nota1Input.value);
        const n2 = parseFloat(nota2Input.value);
        if (nota1Input.value === '' || nota2Input.value === '') {
            resultadoDiv.innerText = "Por favor, preencha todas as notas.";
            resultadoDiv.className = ''; 
            return;
        }

        if (isNaN(n1) || isNaN(n2)) {
            resultadoDiv.innerText = "Digite apenas números válidos.";
            resultadoDiv.className = '';
            return;
        }

        if (n1 < 0 || n1 > 10 || n2 < 0 || n2 > 10) {
            resultadoDiv.innerText = "As notas devem estar entre 0 e 10.";
            resultadoDiv.className = '';
            return;
        }
        const media = (n1 + n2) / 2;
        let situacao = "";
        let classeCor = "";
        if (media >= 7) {
            situacao = "Aprovado";
            classeCor = "aprovado";
        } else if (media >= 5) {
            situacao = "Recuperação";
            classeCor = "recuperacao";
        } else {
            situacao = "Reprovado";
            classeCor = "reprovado";
        }
        resultadoDiv.innerHTML = `Média: ${media.toFixed(1)} <br> Situação: ${situacao}`;
        resultadoDiv.className = classeCor;
        nota1Input.value = '';
        nota2Input.value = '';
    }
</script>

</body>
</html>
